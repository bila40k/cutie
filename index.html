<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rotating Heart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Генерація 3D точок для серця
        const points = [];
        const numPoints = 1500; // Кількість точок для деталізації

        for (let i = 0; i < numPoints; i++) {
            // Параметричні координати
            const u = Math.PI * 2 * Math.random();
            const v = Math.PI * (Math.random() - 0.5);

            // Формула 3D серця
            const r = Math.sin(v);
            const x = 16 * Math.pow(Math.sin(u), 3) * Math.cos(v);
            const y = (13 * Math.cos(u) - 5 * Math.cos(2*u) - 2 * Math.cos(3*u) - Math.cos(4*u)) * Math.cos(v);
            const z = 15 * Math.sin(v) * (1 + Math.sin(u)); // Об'ємність

            points.push({ x, y, z });
        }

        let angleY = 0;
        let angleX = 0.2; // Трохи нахилимо для об'єму

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Центр екрану та масштаб
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.012; 

            angleY += 0.015; // Швидкість обертання

            // Сортуємо точки за Z (щоб дальні малювалися першими, створюючи правильну глибину)
            const transformedPoints = points.map(p => {
                // Обертання навколо осі Y
                let x1 = p.x * Math.cos(angleY) - p.z * Math.sin(angleY);
                let z1 = p.x * Math.sin(angleY) + p.z * Math.cos(angleY);

                // Обертання навколо осі X
                let y2 = p.y * Math.cos(angleX) - z1 * Math.sin(angleX);
                let z2 = p.y * Math.sin(angleX) + z1 * Math.cos(angleX);

                return { x: x1, y: y2, z: z2 };
            });

            // Сортування для правильного рендерингу шарів
            transformedPoints.sort((a, b) => b.z - a.z);

            // Малюємо кожну точку
            transformedPoints.forEach(p => {
                // Проста перспективна проекція
                const distance = 40;
                const perspective = distance / (distance - p.z);
                const screenX = cx + p.x * scale * perspective;
                // Інвертуємо Y, бо в Canvas вісь Y йде вниз
                const screenY = cy - p.y * scale * perspective; 

                // Розрахунок яскравості залежно від глибини (імітація тіні)
                const brightness = Math.floor(((p.z + 20) / 40) * 120) + 135; 
                
                ctx.beginPath();
                // Розмір крапки теж залежить від наближення
                const size = Math.max(1, (perspective * 2.5)); 
                ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
                
                // Гарний неоново-рожевий колір із градієнтом глибини
                ctx.fillStyle = `rgb(${brightness}, ${Math.floor(brightness * 0.3)}, ${Math.floor(brightness * 0.5)})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(255, 50, 100, 0.3)`;
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
