<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Heart</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1200px;
    font-family:Arial;
}

/* background */

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(#ff4d88 1px, transparent 1px);
    background-size:35px 35px;
    opacity:0.08;
    animation:bgmove 20s linear infinite;
}

@keyframes bgmove{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-200px,-200px);
    }
}

/* scene */

.scene{
    position:relative;
    width:600px;
    height:600px;
    transform-style:preserve-3d;
    animation:rotate3d 14s linear infinite;
}

@keyframes rotate3d{
    0%{
        transform:rotateX(15deg) rotateY(0deg);
    }
    100%{
        transform:rotateX(15deg) rotateY(360deg);
    }
}

/* words */

.word{
    position:absolute;
    color:#ff9ebd;
    font-size:15px;
    font-weight:bold;
    text-shadow:
    0 0 10px #ff4d88,
    0 0 20px #ff4d88,
    0 0 40px #ff4d88;
    white-space:nowrap;
    transform-style:preserve-3d;
}

/* center glow */

.center{
    position:absolute;
    color:white;
    font-size:45px;
    text-shadow:
    0 0 20px #ff4d88,
    0 0 40px #ff4d88;
    z-index:10;
}

/* floating particles */

.spark{
    position:absolute;
    color:#ff4d88;
    opacity:0.5;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

</style>
</head>

<body>

<div class="scene" id="scene">
    <div class="center">❤️</div>
</div>

<script>

const scene = document.getElementById("scene");

/*
3D heart
*/

for(let z = -80; z <= 80; z += 12){

    for(let t = 0; t < Math.PI * 2; t += 0.07){

        let x = 16 * Math.pow(Math.sin(t),3);

        let y = -(
            13*Math.cos(t)
            -5*Math.cos(2*t)
            -2*Math.cos(3*t)
            -Math.cos(4*t)
        );

        let word = document.createElement("div");

        word.className = "word";

        word.innerText = "u cute";

        word.style.left = (x * 14 + 300) + "px";

        word.style.top = (y * 14 + 300) + "px";

        word.style.transform = `
            translateZ(${z}px)
            rotateY(${t * 180/Math.PI}deg)
        `;

        scene.appendChild(word);
    }
}

/* particles */

for(let i=0;i<60;i++){

    let spark=document.createElement("div");

    spark.className="spark";

    spark.innerHTML=
    ["💖","✨","💕","❤️"][Math.floor(Math.random()*4)];

    spark.style.left=Math.random()*100+"vw";

    spark.style.fontSize=
    (10+Math.random()*30)+"px";

    spark.style.animationDuration=
    (5+Math.random()*10)+"s";

    document.body.appendChild(spark);
}

</script>

</body>
</html>
