<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#050505,#170014,#30001f);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* animated background */

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,#ff4da6 1px,transparent 1px);
    background-size:40px 40px;
    animation:movebg 15s linear infinite;
    opacity:0.2;
}

@keyframes movebg{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-200px,-200px);
    }
}

/* floating hearts */

.heart{
    position:absolute;
    color:#ff4da6;
    font-size:20px;
    animation:float 10s linear infinite;
    opacity:0.5;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
    }
    to{
        transform:translateY(-120vh) scale(1.5);
    }
}

/* main card */

.card{
    width:420px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
    0 0 30px rgba(255,0,120,0.4),
    inset 0 0 20px rgba(255,255,255,0.05);
    text-align:center;
    z-index:2;
    animation:popup 1s ease;
}

@keyframes popup{
    from{
        transform:scale(0.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* image */

.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #ff4da6;
    box-shadow:0 0 30px #ff4da6;
    margin-bottom:20px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        box-shadow:0 0 15px #ff4da6;
    }
    50%{
        box-shadow:0 0 40px #ff4da6;
    }
    100%{
        box-shadow:0 0 15px #ff4da6;
    }
}

h1{
    color:white;
    font-size:42px;
    margin-bottom:10px;
    text-shadow:0 0 15px #ff4da6;
}

p{
    color:#ffd6ec;
    font-size:20px;
    line-height:1.6;
    margin-bottom:25px;
}

/* button */

button{
    background:linear-gradient(45deg,#ff0080,#ff4da6);
    border:none;
    color:white;
    padding:15px 35px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px #ff0080;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 40px #ff4da6;
}

/* bottom text */

.bottom{
    position:absolute;
    bottom:20px;
    color:#ff9acb;
    font-size:18px;
    letter-spacing:2px;
    animation:fade 2s infinite alternate;
}

@keyframes fade{
    from{
        opacity:0.4;
    }
    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="card">

    <!-- СЮДА СТАВИШ СВОЄ ФОТО -->
    <img src="yourphoto.jpg" class="avatar">

    <h1>Ты милая ❤️</h1>

    <p>
        Просто хотел сказать,<br>
        что твоя улыбка делает день лучше :)
    </p>

    <button onclick="love()">
        Нажми сюда ✨
    </button>

</div>

<div class="bottom">
    ★ самая красивая ★
</div>

<!-- music -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<script>

function love(){
    alert("❤️ Мне очень нравится твоя улыбка ❤️");
}

/* hearts */

for(let i=0;i<40;i++){

    let heart=document.createElement("div");

    heart.className="heart";

    heart.innerHTML=["💖","💕","✨","💘"][Math.floor(Math.random()*4)];

    heart.style.left=Math.random()*100+"vw";

    heart.style.animationDuration=
    (5+Math.random()*10)+"s";

    heart.style.fontSize=
    (15+Math.random()*30)+"px";

    document.body.appendChild(heart);
}

</script>

</body>
</html>
