<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Для тебя ❤️</title>

    <style>
        body{
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: Arial;
            overflow: hidden;
        }

        .card{
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            animation: fade 1.5s ease;
        }

        h1{
            color: #ff4f81;
            font-size: 40px;
        }

        p{
            font-size: 22px;
        }

        .heart{
            font-size: 50px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse{
            0%{transform: scale(1);}
            50%{transform: scale(1.2);}
            100%{transform: scale(1);}
        }

        @keyframes fade{
            from{opacity:0; transform: translateY(20px);}
            to{opacity:1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="card">
    <div class="heart">❤️</div>
    <h1>Ты милая</h1>
    <p>
        Просто хотел сказать,<br>
        что ты очень красивая и приятная :)
    </p>
</div>

</body>
</html>
