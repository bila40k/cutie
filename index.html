<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Heart</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b1a3a;
    overflow:hidden;
    font-family: monospace;
}

pre{
    color:red;
    font-size:14px;
    line-height:14px;
    text-shadow:0 0 10px red;
}
</style>
</head>

<body>

<pre id="heart"></pre>

<script>
let text = "";

for (let y = 1.5; y > -1.5; y -= 0.1) {
    for (let x = -1.5; x < 1.5; x += 0.05) {

        let a = x*x + y*y - 1;

        if (a*a*a - x*x*y*y*y <= 0) {
            text += "❤";
        } else {
            text += " ";
        }
    }
    text += "\n";
}

document.getElementById("heart").innerText = text;
</script>

</body>
</html>
