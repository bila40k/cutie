<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Heart Canvas</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* -------- HEART POINTS -------- */
const points = [];

for(let z = -60; z <= 60; z += 10){
    for(let t = 0; t < Math.PI * 2; t += 0.18){

        const x = 16 * Math.pow(Math.sin(t), 3);

        const y = -(
            13 * Math.cos(t)
            - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t)
            - Math.cos(4*t)
        );

        points.push({
            x: x * 12,
            y: y * 12,
            z: z
        });
    }
}

/* -------- 3D ROTATION -------- */
let angle = 0;

function rotate3D(x,y,z){
    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);

    // rotate Y
    const dx = x * cosA - z * sinA;
    const dz = x * sinA + z * cosA;

    return { x: dx, y: y, z: dz };
}

/* -------- RENDER LOOP -------- */
function draw(){

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    angle += 0.01;

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    for(const p of points){

        const r = rotate3D(p.x, p.y, p.z);

        const perspective = 400 / (400 - r.z);

        const x2d = r.x * perspective + cx;
        const y2d = r.y * perspective + cy;

        const size = (1 - r.z / 200) * 2;

        // glow effect
        ctx.fillStyle = "#ff4d88";

        ctx.shadowColor = "#ff4d88";
        ctx.shadowBlur = 10;

        ctx.beginPath();
        ctx.arc(x2d, y2d, size, 0, Math.PI * 2);
        ctx.fill();

        // text overlay (optional)
        ctx.shadowBlur = 0;
        ctx.fillStyle = "white";
        ctx.font = "10px Arial";
        ctx.fillText("u cute", x2d, y2d);
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
