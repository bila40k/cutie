<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heart</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}
canvas {
  display: block;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H, CX, CY, SCALE;
const DPR = Math.min(window.devicePixelRatio || 1, 2);

const TOTAL = 180;
const points = [];

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;

  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";

  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(DPR, DPR);

  CX = W / 2;
  CY = H / 2;

  SCALE = Math.min(W, H) * 0.015;

  build();
}

function heart(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)
  };
}

function build() {
  points.length = 0;

  for (let i = 0; i < TOTAL; i++) {
    const t = (i / TOTAL) * Math.PI * 2;

    const h = heart(t);

    points.push({
      x: h.x * SCALE,
      y: -h.y * SCALE,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawText(x, y, text, size, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;

  ctx.font = bold ${size}px Arial;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.shadowColor = "rgba(255, 80, 160, 0.9)";
  ctx.shadowBlur = 20;

  ctx.fillStyle = "white";
  ctx.fillText(text, x, y);

  ctx.restore();
}

let angle = 0;

function animate() {
  requestAnimationFrame(animate);

  ctx.clearRect(0, 0, W, H);

  angle += 0.01;

  const cos = Math.cos(angle);
  const sin = Math.sin(angle);

  for (let i = 0; i < points.length; i++) {
    const p = points[i];

    // fake 3D rotation
    const z = Math.sin(angle + p.phase) * 20;

    const rx = p.x * cos - z * sin;
    const rz = p.x * sin + z * cos;

    const x = CX + rx;
    const y = CY + p.y;

    const size = 10 + (rz + 20) * 0.3;
    const alpha = Math.min(1, Math.max(0.2, (rz + 30) / 60));

    drawText(x, y, "I ♥ YOU", size, alpha);
  }

  // center glow text
  drawText(CX, CY, "CUTIE", 40 + Math.sin(angle)*5, 1);
}

window.addEventListener("resize", resize);

resize();
animate();
</script>

</body>
</html>
