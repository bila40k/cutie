<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>u cute ❤️</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

/* background glow */

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(#ff4d88 1px, transparent 1px);
    background-size:30px 30px;
    opacity:0.08;
    animation:bgmove 20s linear infinite;
}

@keyframes bgmove{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-200px,-200px);
    }
}

/* heart */

.heart-wrapper{
    position:relative;
    width:500px;
    height:500px;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:spin 12s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.word{
    position:absolute;
    color:#ff9ebd;
    font-size:15px;
    font-weight:bold;
    text-shadow:
    0 0 8px #ff4d88,
    0 0 15px #ff4d88;
    white-space:nowrap;
}

/* center text */

.center{
    position:absolute;
    color:white;
    text-align:center;
    z-index:10;
}

.center h1{
    font-size:45px;
    margin:0;
    text-shadow:0 0 20px #ff4d88;
}

.center p{
    color:#ffb6cf;
    margin-top:10px;
    font-size:18px;
}

/* particles */

.spark{
    position:absolute;
    color:#ff4d88;
    opacity:0.5;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

</style>
</head>

<body>

<div class="heart-wrapper" id="heart"></div>

<div class="center">
    <h1>❤️</h1>
    <p>u cute</p>
</div>

<script>

const heart = document.getElementById("heart");

/* create heart from words */

for(let t = 0; t < Math.PI * 2; t += 0.09){

    let x = 16 * Math.pow(Math.sin(t),3);
    
    let y = -(13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t));

    let word = document.createElement("div");

    word.className = "word";

    word.innerText = "u cute";

    word.style.left = (x * 14 + 250) + "px";

    word.style.top = (y * 14 + 250) + "px";

    word.style.transform =
    `rotate(${t * 180/Math.PI}deg)`;

    heart.appendChild(word);
}

/* floating effects */

for(let i=0;i<40;i++){

    let s=document.createElement("div");

    s.className="spark";

    s.innerHTML=["💖","✨","💕","❤️"][Math.floor(Math.random()*4)];

    s.style.left=Math.random()*100+"vw";

    s.style.fontSize=
    (10+Math.random()*25)+"px";

    s.style.animationDuration=
    (5+Math.random()*10)+"s";

    document.body.appendChild(s);
}

</script>

</body>
</html>
